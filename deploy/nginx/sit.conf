# SITVO — copiar al servidor como /etc/nginx/conf.d/sit.conf
# (o incluir desde sites-available según tu distro). Luego: sudo nginx -t && sudo systemctl reload nginx
#
# client_max_body_size evita 413 Request Entity Too Large en POST /api/egresados con PDF.

server {
    listen 80;
    server_name 77.37.74.122;

    client_max_body_size 100M;

    root /var/www/sit;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
