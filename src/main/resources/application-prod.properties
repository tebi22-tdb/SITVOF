# Producción en VPS — activar con: --spring.profiles.active=prod
# Secretos y rutas sensibles solo por variables de entorno (no commitear valores reales).

sit.jwt.secret=${SIT_JWT_SECRET}
sit.cert.base-url=${SIT_CERT_BASE_URL:https://sitvo.net}
sit.cert.keystore-password=${SIT_KEYSTORE_PASSWORD}

# MongoDB local en el servidor (usuario/contraseña en la URI)
spring.data.mongodb.uri=${SIT_MONGODB_URI:mongodb://127.0.0.1:27017/sit_titulacion}

sit.cert.keystore-path=${SIT_KEYSTORE_PATH:/opt/sit/keystore/sit-keystore.p12}
