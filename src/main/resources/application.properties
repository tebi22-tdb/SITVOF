spring.application.name=sit
server.port=8081
# Tras Nginx como proxy inverso: cookies y URLs coherentes con el host público
server.forward-headers-strategy=framework

# JWT (sesión por pestaña en el front: Bearer; cambiar en producción con variable de entorno)
sit.jwt.secret=${SIT_JWT_SECRET:dev-placeholder-secret-not-for-production}
sit.jwt.expiration-hours=12

# MongoDB — desarrollo: VPS con datos reales. Producción: perfil prod + SIT_MONGODB_URI (localhost con auth).
# Seed admin (admin / sitvo2026): crear o sincronizar contraseña al arrancar.
sit.seed.sync-admin-credentials=${SIT_SEED_SYNC_ADMIN:true}
spring.data.mongodb.uri=${SIT_MONGODB_URI:mongodb://77.37.74.122:27017/sit_titulacion?connectTimeoutMS=10000&serverSelectionTimeoutMS=5000&socketTimeoutMS=5000}
spring.data.mongodb.database=sit_titulacion

# Jackson 2 para JSON
spring.http.converters.preferred-json-mapper=jackson2

# Mail: Gmail — usar contraseña de aplicación (16 caracteres) SIN espacios; SitMailSenderConfig también quita espacios por si acaso.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=l21920103@voaxaca.tecnm.mx
spring.mail.password=${SIT_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Residencia: avisos de plazo por correo (Anexo XXXI + 6 meses)
sit.residencia.notificaciones.enabled=true
sit.residencia.notificaciones.cron=0 0 8 * * *
sit.residencia.plazo.zona-horaria=America/Mexico_City

# Tesis/monografía (flujo 7): desarrollo 12/18 meses + trámite 6 meses tras liberación
sit.plazo.no-res.notificaciones.enabled=true
sit.plazo.no-res.notificaciones.cron=0 0 8 * * *
sit.plazo.no-res.zona-horaria=America/Mexico_City

# Límite de tamaño en carga de archivos (alineado con Nginx client_max_body_size y ArchivoPdfValidator)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
server.tomcat.max-http-form-post-size=100MB
server.tomcat.max-swallow-size=100MB

# --- PDF anexos 
# 9.1 y 9.3: plantillas XHTML en classpath (templates/html/*.html) vía OpenHTMLtoPDF — sin LibreOffice.
# 9.2: Word .docx + LibreOffice (rutas abajo).
sit.soffice.path=C:/Program Files/LibreOffice/program/soffice.exe

# Solo anexo 9.2 (DOCX en disco o recurso empaquetado). Las propiedades 91/93 se ignoran para PDF; puedes borrarlas o dejarlas por si se reactiva DOCX.
sit.anexo92.plantilla-docx=${user.home}/Downloads/Anexo9.2.docx

# Certificacion PKI: keystore PKCS12 autofirmado, generado automaticamente si no existe.
sit.cert.keystore-path=${user.home}/sit-keystore.p12
sit.cert.keystore-password=${SIT_KEYSTORE_PASSWORD:dev-keystore-password}
# URL base publica del sistema (se usa en el QR del documento certificado)
sit.cert.base-url=https://sitvo.net

# Anexo 9.1: nombre del destinatario (línea superior a “Jefe del departamento de servicios escolares”), como en la plantilla ITVO. Vacío = línea mínima sin texto.
sit.anexo91.destinatario-servicios-escolares=

# Configuración institucional (hojas 32/33): valores por defecto, sobreescribibles desde el panel de admin.
sit.config.jefe-division-nombre=MANUEL FABIAN ROJAS
sit.config.jefe-division-titulo=JEFE

# Anexo 9.3: nombre que aparece bajo la línea de firma (plantilla ITVO).
sit.anexo93.jefe-division-nombre=MANUEL FABIAN ROJAS

# Oficio de asignación de sinodales (departamento académico → división de estudios).
sit.oficio-sinodales.instituto=Instituto Tecnol\u00f3gico del Valle de Oaxaca
sit.oficio-sinodales.lugar=Nazareno, Xoxocotl\u00e1n, Oaxaca
sit.oficio-sinodales.jefe-division-nombre=MANUEL FABIAN ROJAS
sit.oficio-sinodales.jefe-division-cargo=JEFE DE LA DIVISI\u00d3N DE ESTUDIOS PROFESIONALES
sit.oficio-sinodales.jefa-departamento-nombre=MARIANA D\u00cdAZ JARQU\u00cdN
sit.oficio-sinodales.iniciales-firma=MDJ/mcgl
sit.oficio-sinodales.siglas-por-slug=ciencias_basicas:DCB,ingenierias:DEI,economico_administrativo:DEA,virtuales:DV
# Acto 9.3: interpretación de fecha/hora sin zona (calendario) y texto del PDF del acto; alinear con la sede (p. ej. America/Mazatlan si aplica).
sit.acto93.zona-horaria=America/Mexico_City

# Oficio de asignación de sinodales (departamento académico → división de estudios).
sit.oficio-sinodales.instituto=Instituto Tecnológico del Valle de Oaxaca
sit.oficio-sinodales.lugar=Nazareno, Xoxocotlán, Oaxaca
sit.oficio-sinodales.jefe-division-nombre=MANUEL FABIAN ROJAS
sit.oficio-sinodales.jefe-division-cargo=JEFE DE LA DIVISIÓN DE ESTUDIOS PROFESIONALES
sit.oficio-sinodales.jefa-departamento-nombre=MARIANA DÍAZ JARQUÍN
sit.oficio-sinodales.iniciales-firma=MDJ/mcgl
sit.oficio-sinodales.siglas-por-slug=ciencias_basicas:DCB,ingenierias:DEI,economico_administrativo:DEA,virtuales:DV
