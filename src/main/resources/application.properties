spring.application.name=sit
server.port=8081
# Tras Nginx como proxy inverso: cookies y URLs coherentes con el host público
server.forward-headers-strategy=framework

# JWT (sesión por pestaña en el front: Bearer; cambiar en producción con variable de entorno)
sit.jwt.secret=${SIT_JWT_SECRET:dev-placeholder-secret-not-for-production}
sit.jwt.expiration-hours=12

# MongoDB: servidor 77.37.74.122, base sit_titulacion, colección "registro" (en Egresado.kt)
# Además de connectTimeoutMS, limitamos selección de servidor y lectura de socket para no dejar colgada la UI local si la VPS responde lento.
spring.data.mongodb.uri=mongodb://77.37.74.122:27017/sit_titulacion?connectTimeoutMS=10000&serverSelectionTimeoutMS=5000&socketTimeoutMS=5000
spring.data.mongodb.database=sit_titulacion

# Jackson 2 para JSON
spring.http.converters.preferred-json-mapper=jackson2

# Mail: Gmail — usar contraseña de aplicación (16 caracteres) SIN espacios; SitMailSenderConfig también quita espacios por si acaso.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=l21920103@voaxaca.tecnm.mx
spring.mail.password=${SIT_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Límite de tamaño en carga de archivos (debe ser ≤ client_max_body_size en Nginx)
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1

# --- PDF anexos 
# 9.1 y 9.3: plantillas XHTML en classpath (templates/html/*.html) vía OpenHTMLtoPDF — sin LibreOffice.
# 9.2: Word .docx + LibreOffice (rutas abajo).
sit.soffice.path=C:/Program Files/LibreOffice/program/soffice.exe

# Solo anexo 9.2 (DOCX en disco o recurso empaquetado). Las propiedades 91/93 se ignoran para PDF; puedes borrarlas o dejarlas por si se reactiva DOCX.
sit.anexo92.plantilla-docx=${user.home}/Downloads/Anexo9.2.docx

# Certificacion PKI: keystore PKCS12 autofirmado, generado automaticamente si no existe.
sit.cert.keystore-path=${user.home}/sit-keystore.p12
sit.cert.keystore-password=${SIT_KEYSTORE_PASSWORD:dev-keystore-password}
# URL base publica del sistema (se usa en el QR del documento certificado)
sit.cert.base-url=http://77.37.74.122

# Anexo 9.1: nombre del destinatario (línea superior a “Jefe del departamento de servicios escolares”), como en la plantilla ITVO. Vacío = línea mínima sin texto.
sit.anexo91.destinatario-servicios-escolares=

# Anexo 9.3: nombre que aparece bajo la línea de firma (plantilla ITVO).
sit.anexo93.jefe-division-nombre=MANUEL FABIAN ROJAS
# Acto 9.3: interpretación de fecha/hora sin zona (calendario) y texto del PDF del acto; alinear con la sede (p. ej. America/Mazatlan si aplica).
sit.acto93.zona-horaria=America/Mexico_City
